name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile and Bundle Action
        run: npm run build

      - name: Verify build is up-to-date
        run: |
          git diff --exit-code dist/index.js || (echo "❌ Compiled dist/index.js is out of sync with src/index.ts. Please run 'npm run build' locally and commit the changes." && exit 1)

      - name: Run Unit/Integration Tests
        run: npm test

      # Test the action itself using local codebase (uses: ./)
      - name: Self-Test Action (Check Mode)
        uses: ./
        if: env.HAS_SECRET == 'true'
        with:
          api-key: ${{ secrets.REGRESSIONBOT_API_KEY }}
          project: 'action-self-test'
          test-origin: 'https://example.com'
          devices: 'Desktop Chrome'
        env:
          HAS_SECRET: ${{ secrets.REGRESSIONBOT_API_KEY != '' }}
